<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ExoAtom Replica</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <section class="search-panel" aria-labelledby="search-title">
        <h1 id="search-title">ExoAtom</h1>
        <form id="search-form" class="search-form">
          <label class="field">
            <span>Species</span>
            <input id="species-input" name="species" autocomplete="off" placeholder="Mg">
          </label>

          <label class="checkbox-field">
            <span>All ionization stages?</span>
            <input id="all-stages-input" name="allStages" type="checkbox">
          </label>

          <div class="actions">
            <button type="submit">Search</button>
            <button id="clear-button" class="secondary" type="button">Clear</button>
          </div>
        </form>
      </section>

      <section class="results" aria-live="polite">
        <h2>Search Results</h2>
        <div id="results-list" class="results-list">
          <p class="empty">Search for a species such as Mg.</p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
