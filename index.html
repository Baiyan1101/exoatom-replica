<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ExoAtom Replica</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>ExoAtom</h1>
        <p>This is the development version of ExoAtom.</p>
        <p>Search for species using terms such as `Al`, `Cr+` or `W+`, or select an element from the periodic table below.</p>
      </header>

      <section class="search-panel" aria-labelledby="search-title">
        <h2 id="search-title">Search</h2>
        <form id="search-form" class="search-form">
          <label class="field">
            <span>Species</span>
            <input id="species-input" name="species" autocomplete="off" placeholder="Search...">
          </label>

          <label class="checkbox-field">
            <span>All ionization stages?</span>
            <input id="all-stages-input" name="allStages" type="checkbox">
          </label>

          <div class="actions">
            <button type="submit">Search</button>
            <button id="clear-button" class="secondary" type="button">Clear</button>
          </div>
        </form>
      </section>

      <section id="results" class="results" aria-live="polite">
        <div id="results-list" class="results-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
